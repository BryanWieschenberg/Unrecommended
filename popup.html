<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        width: 240px;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #fafafa;
        color: #222;
        padding: 16px;
      }
      h1 {
        font-size: 15px;
        font-weight: 700;
        margin-bottom: 4px;
      }
      .subtitle {
        font-size: 11px;
        color: #888;
        margin-bottom: 16px;
      }
      .site-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 0;
        border-bottom: 1px solid #eee;
      }
      .site-row:last-child {
        border-bottom: none;
      }
      .site-info {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .site-icon {
        width: 24px;
        height: 24px;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        font-weight: 700;
        color: #fff;
        flex-shrink: 0;
      }
      .site-icon.linkedin { background: #0a66c2; }
      .site-icon.youtube { background: #cc0000; }
      .site-icon.instagram { background: #c13584; }
      .site-name {
        font-size: 13px;
        font-weight: 500;
      }
      .status {
        font-size: 11px;
        font-weight: 600;
        color: #2e7d32;
        background: #e8f5e9;
        padding: 3px 8px;
        border-radius: 12px;
      }
    </style>
  </head>
  <body>
    <h1>Unrecommended</h1>
    <p class="subtitle">Blocking is permanently active</p>

    <div class="site-row">
      <div class="site-info">
        <div class="site-icon linkedin">in</div>
        <span class="site-name">LinkedIn</span>
      </div>
      <span class="status">Active</span>
    </div>

    <div class="site-row">
      <div class="site-info">
        <div class="site-icon youtube">YT</div>
        <span class="site-name">YouTube</span>
      </div>
      <span class="status">Active</span>
    </div>

    <div class="site-row">
      <div class="site-info">
        <div class="site-icon instagram">IG</div>
        <span class="site-name">Instagram</span>
      </div>
      <span class="status">Active</span>
    </div>
  </body>
</html>
